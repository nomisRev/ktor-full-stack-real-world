ktor:
    application:
        modules:
            - org.jetbrains.realworld.ApplicationKt.module
    deployment:
        port: 8080

database:
    driverClassName: "org.postgresql.Driver"
    host: "localhost"
    port: 5432
    name: "ktor_sample"
    username: "ktor_user"
    password: "ktor_password"
    maxPoolSize: 20
    cachePrepStmts: true
    prepStmtCacheSize: 250
    prepStmtCacheSqlLimit: 2048
    migrations:
        locations: "classpath:db/migration"
        baselineOnMigrate: true

jwt:
    secret: "realworld-jwt-secret-key-should-be-at-least-32-characters"
    issuer: "realworld-api"
    audience: "realworld-clients"
    realm: "realworld"
    expiration: 3600000  # 1 hour in milliseconds

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: realworld-postgres
    command: -c 'max_connections=20'
    environment:
      POSTGRES_DB: ktor_sample
      POSTGRES_USER: ktor_user
      POSTGRES_PASSWORD: ktor_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ktor_user -d ktor_sample"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db-seed:
    image: postgres:16-alpine
    container_name: realworld-db-seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ktor_password
    volumes:
      - ./manual-test-data.sql:/seed/manual-test-data.sql:ro
      - ./db-seed.sh:/seed/db-seed.sh:ro
    entrypoint: ["/bin/sh", "/seed/db-seed.sh"]
    restart: "no"

volumes:
  postgres_data:
    driver: local

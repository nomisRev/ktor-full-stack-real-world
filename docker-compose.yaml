version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: realworld-postgres
    command: -c 'max_connections=20'
    environment:
      POSTGRES_DB: ktor_sample
      POSTGRES_USER: ktor_user
      POSTGRES_PASSWORD: ktor_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ktor_user -d ktor_sample"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local